<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Again 2002</title>
  <link rel="icon" type="image/png" href="./assets/again2002-logo.png" />
  <link rel="apple-touch-icon" href="./assets/again2002-logo.png" />
  <script src="./again.config.js"></script>
  <style>
    :root {
      --bg: #eee8dc;
      --ink: #1d1c18;
      --muted: #716c61;
      --panel: rgba(250,247,239,.86);
      --line: rgba(49,44,35,.13);
      --green: #496c58;
      --red: #a64d3f;
      --blue: #536d82;
      --gold: #9b7744;
      --paper: #f8f3e7;
      --paper-2: #f1eadc;
      --shadow: 0 14px 34px rgba(49,44,35,.11);
      --radius: 8px;
      font-family: Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root[data-theme="dark"] {
      --bg: #151613;
      --ink: #f3efe5;
      --muted: #a9a092;
      --panel: rgba(31,32,28,.88);
      --line: rgba(243,239,229,.13);
      --green: #8aa68e;
      --red: #d18475;
      --blue: #91a8bd;
      --gold: #c8a76b;
      --paper: #24251f;
      --paper-2: #2b2b25;
      --shadow: 0 14px 34px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scrollbar-color: rgba(36,93,69,.55) rgba(25,28,35,.08);
      scrollbar-gutter: stable;
      background:
        radial-gradient(circle at 18% 6%, rgba(73,108,88,.09), transparent 30%),
        linear-gradient(rgba(73,108,88,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(73,108,88,.035) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 46px 46px, 46px 46px, auto;
      color: var(--ink);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(36,93,69,.55) rgba(25,28,35,.08);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(25,28,35,.06);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      border: 2px solid rgba(243,240,233,.9);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(36,93,69,.82), rgba(168,115,33,.72));
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(25,73,52,.95), rgba(199,61,54,.72));
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    :root[data-theme="dark"] input,
    :root[data-theme="dark"] textarea {
      background: rgba(22,23,20,.78);
      border-color: rgba(243,239,229,.15);
      color: var(--ink);
    }

    :root[data-theme="dark"] label {
      color: #d9d1c1;
    }

    .app {
      width: min(1360px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 2.4vw, 30px) 34px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 8px 0 22px;
      border-bottom: 2px solid rgba(23,25,31,.12);
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 5.8rem);
      line-height: .88;
      letter-spacing: 0;
      font-weight: 950;
    }

    .home-link {
      color: inherit;
      text-decoration: none;
    }

    .home-link:hover {
      text-decoration: underline;
      text-decoration-thickness: .08em;
      text-underline-offset: .08em;
    }

    .lead {
      display: grid;
      gap: 4px;
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(1.02rem, 1.8vw, 1.45rem);
      font-weight: 850;
    }

    .lead span:last-child {
      color: var(--muted);
      font-weight: 700;
    }

    .live-chip {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      box-shadow: var(--shadow);
      color: var(--green);
      font-weight: 900;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .signup-cta {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(73,108,88,.2);
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 950;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    .theme-toggle {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    :root[data-theme="dark"] .signup-cta {
      background: #f3efe5;
      color: #151613;
      border-color: rgba(243,239,229,.34);
    }

    :root[data-theme="dark"] .theme-toggle,
    :root[data-theme="dark"] .live-chip {
      background: rgba(31,32,28,.82);
    }

    :root[data-theme="dark"] .theme-toggle {
      border-color: rgba(243,239,229,.28);
      color: #f3efe5;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(290px, 360px) minmax(0, 1fr) minmax(260px, 310px);
      gap: 16px;
      align-items: start;
      padding-top: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 15px 10px;
      border-bottom: 1px solid rgba(25,28,35,.08);
    }

    .panel-header h2 {
      margin: 0;
      font-size: .98rem;
      letter-spacing: 0;
    }

    .mini {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .composer {
      display: grid;
      gap: 12px;
      padding: 15px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .is-hidden,
    .field.is-hidden,
    .composer-account.is-hidden {
      display: none;
    }

    .composer-account {
      display: grid;
      gap: 3px;
      padding: 10px 11px;
      border: 1px solid rgba(73,108,88,.2);
      border-radius: var(--radius);
      background: rgba(73,108,88,.08);
    }

    .composer-account strong {
      font-size: .92rem;
    }

    .composer-account span {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
    }

    .composer-login {
      display: grid;
      gap: 8px;
      margin-top: 7px;
    }

    .composer-login button {
      min-height: 40px;
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-weight: 950;
    }

    label {
      color: #282c34;
      font-size: .82rem;
      font-weight: 850;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(25,28,35,.15);
      border-radius: var(--radius);
      background: rgba(255,252,246,.78);
      color: var(--ink);
      outline: none;
      padding: 11px 12px;
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(36,93,69,.68);
      box-shadow: 0 0 0 3px rgba(36,93,69,.12);
    }

    input[type="color"] {
      height: 42px;
      padding: 4px;
    }

    input[type="file"] {
      padding: 9px 10px;
    }

    .media-note {
      color: var(--muted);
      font-size: .76rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .style-row,
    .category-row {
      display: grid;
      gap: 7px;
    }

    .style-row {
      grid-template-columns: repeat(3, 1fr);
    }

    .category-row {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .style-row button,
    .category-row button {
      min-height: 38px;
      border: 1px solid rgba(25,28,35,.13);
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
      color: var(--muted);
      font-weight: 900;
      padding: 0 5px;
    }

    .style-row button.active,
    .category-row button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    :root[data-theme="dark"] .style-row button,
    :root[data-theme="dark"] .category-row button,
    :root[data-theme="dark"] .mode-row button {
      border-color: rgba(243,239,229,.24);
      background: #262720;
      color: #f3efe5;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    :root[data-theme="dark"] .style-row button.active,
    :root[data-theme="dark"] .category-row button.active,
    :root[data-theme="dark"] .mode-row button.active {
      border-color: #f3efe5;
      background: #f3efe5;
      color: #151613;
      box-shadow: none;
    }

    .mode-row button {
      min-height: 38px;
      border: 1px solid rgba(25,28,35,.13);
      border-radius: var(--radius);
      background: rgba(255,255,255,.72);
      color: var(--muted);
      font-weight: 900;
    }

    .mode-row button.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    :root[data-theme="dark"] .style-row button.active,
    :root[data-theme="dark"] .category-row button.active,
    :root[data-theme="dark"] .mode-row button.active {
      border-color: #f3efe5;
      background: #f3efe5;
      color: #151613;
      box-shadow: none;
    }

    .submit {
      width: 100%;
      min-height: 46px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-weight: 950;
    }

    :root[data-theme="dark"] .submit,
    :root[data-theme="dark"] .small-btn,
    :root[data-theme="dark"] .comment-form button {
      background: #f3efe5;
      color: #151613;
      border: 1px solid #f3efe5;
    }

    .notice {
      min-height: 21px;
      margin: 0;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.45;
    }

    .feed-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .feed-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .feed-title strong {
      font-size: 1rem;
    }

    .clear-filter {
      display: none;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 900;
    }

    .clear-filter.show {
      display: inline-flex;
      align-items: center;
    }

    .feed {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .card {
      position: relative;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      border: 1px solid rgba(49,44,35,.14);
      border-radius: var(--radius);
      background: var(--card-bg, var(--paper));
      color: var(--card-fg, var(--ink));
      box-shadow: 0 12px 28px rgba(49,44,35,.1);
      outline: 1px solid rgba(255,255,255,.45);
      outline-offset: -2px;
    }

    .card.bold {
      border-top: 5px solid rgba(166,77,63,.72);
    }

    .card.paper {
      background:
        linear-gradient(rgba(49,44,35,.035) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255,255,255,.36), rgba(255,255,255,0) 42%),
        var(--card-bg, var(--paper));
      background-size: 100% 30px;
    }

    .card.board {
      border: 6px solid #6f5944;
      background:
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.07), transparent 12%),
        linear-gradient(rgba(255,255,255,.038) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        var(--card-bg, #36584a);
      background-size: auto, 34px 34px, 34px 34px, auto;
      box-shadow: inset 0 0 28px rgba(255,255,255,.055), 0 12px 28px rgba(49,44,35,.11);
    }

    .card-main {
      padding: 15px 15px 10px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: color-mix(in srgb, var(--card-fg, #1d1c18) 72%, transparent);
      font-size: .78rem;
      font-weight: 850;
    }

    .author-btn {
      max-width: 72%;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 8px;
      border: 1px solid rgba(25,28,35,.13);
      border-radius: 999px;
      background: rgba(255,255,255,.35);
      color: var(--card-fg, var(--ink));
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    :root:not([data-theme="dark"]) .author-btn,
    :root:not([data-theme="dark"]) .comment-author {
      color: #111;
    }

    .card .author-btn,
    .card .comment-author,
    .card .author-btn span:not(.ip-tag):not(.level-tag),
    .card .comment-author span:not(.ip-tag):not(.level-tag) {
      color: #111 !important;
    }

    .ip-tag,
    .level-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(49,44,35,.08);
      color: color-mix(in srgb, var(--card-fg, #1d1c18) 72%, transparent);
      font-size: .72rem;
      font-weight: 850;
    }

    .level-5 { color: #496c58 !important; }
    .level-10 { color: #536d82 !important; }
    .level-20 { color: #9b7744 !important; }
    .level-30 { color: #a64d3f !important; }

    :root[data-theme="dark"] .level-5 { color: #9bb89f !important; }
    :root[data-theme="dark"] .level-10 { color: #9fb9ce !important; }
    :root[data-theme="dark"] .level-20 { color: #d6b775 !important; }
    :root[data-theme="dark"] .level-30 { color: #e19a8a !important; }

    .message {
      margin: 16px 0 14px;
      min-height: 86px;
      font-size: clamp(1.02rem, 1.45vw, 1.28rem);
      line-height: 1.45;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .board .message {
      font-family: "Comic Sans MS", "Bradley Hand ITC", "Segoe Print", cursive;
      text-shadow: 0 0 1px currentColor;
      transform: rotate(-.25deg);
    }

    .censored {
      display: inline-block;
      padding: 0 .28em;
      border-radius: 6px;
      background: rgba(25,28,35,.12);
      color: currentColor;
    }

    .card-media {
      margin: 0 15px 14px;
      overflow: hidden;
      border: 1px solid rgba(25,28,35,.11);
      border-radius: var(--radius);
      background: rgba(255,255,255,.3);
    }

    .card-media img,
    .card-media video {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
    }

    .media-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      color: color-mix(in srgb, var(--card-fg, #1d1c18) 78%, transparent);
      font-size: .8rem;
      font-weight: 900;
    }

    .card-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid rgba(25,28,35,.1);
      background: rgba(248,243,231,.26);
    }

    .react {
      min-height: 44px;
      border-right: 1px solid rgba(25,28,35,.09);
      background: transparent;
      color: var(--card-fg, var(--ink));
      font-size: .86rem;
      font-weight: 950;
    }

    .react:last-child {
      border-right: 0;
    }

    .report-btn {
      position: absolute;
      right: 10px;
      bottom: 54px;
      z-index: 2;
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 1px solid rgba(25,28,35,.12);
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      color: color-mix(in srgb, var(--card-fg, #1d1c18) 74%, #496c58);
      opacity: .74;
      transition: opacity .16s ease, transform .16s ease, background .16s ease;
    }

    .report-btn:hover {
      opacity: 1;
      transform: translateY(-1px);
      background: rgba(255,255,255,.86);
    }

    .report-btn svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }

    .comments {
      display: none;
      border-top: 1px solid rgba(25,28,35,.1);
      padding: 11px 12px 12px;
      background: rgba(255,255,255,.34);
    }

    :root[data-theme="dark"] .comments {
      background: rgba(0,0,0,.12);
      border-top-color: rgba(243,239,229,.12);
    }

    .comments.open {
      display: grid;
      gap: 9px;
    }

    .comment-list {
      display: grid;
      gap: 7px;
      max-height: 142px;
      overflow: auto;
    }

    .comment {
      display: grid;
      gap: 3px;
      padding: 8px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.36);
      font-size: .82rem;
      line-height: 1.35;
    }

    :root[data-theme="dark"] .comment {
      background: rgba(255,255,255,.08);
    }

    .comment button {
      justify-self: start;
      padding: 0;
      background: transparent;
      color: inherit;
      font-size: .76rem;
      font-weight: 950;
    }

    .comment-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .comment-form button,
    .small-btn {
      min-width: 48px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-weight: 950;
    }

    :root[data-theme="dark"] .submit,
    :root[data-theme="dark"] .small-btn,
    :root[data-theme="dark"] .comment-form button {
      background: #f3efe5;
      color: #151613;
      border: 1px solid #f3efe5;
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .meter-wrap {
      padding: 15px;
    }

    .meter-top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
    }

    .meter-score {
      font-size: 2.3rem;
      font-weight: 950;
      line-height: 1;
    }

    .bar {
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(25,28,35,.1);
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 40%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
      transition: width .25s ease;
    }

    .profile,
    .account,
    .stat-list,
    .goal-list {
      display: grid;
      gap: 9px;
      padding: 13px 15px 15px;
      margin: 0;
      list-style: none;
    }

    .profile-item,
    .account-item,
    .stat,
    .goal {
      display: grid;
      gap: 5px;
      padding: 11px;
      border: 1px solid rgba(25,28,35,.1);
      border-radius: var(--radius);
      background: rgba(255,255,255,.48);
      color: var(--ink);
      font-size: .86rem;
      line-height: 1.38;
    }

    :root[data-theme="dark"] .profile-item,
    :root[data-theme="dark"] .account-item,
    :root[data-theme="dark"] .stat,
    :root[data-theme="dark"] .goal {
      border-color: rgba(243,239,229,.14);
      background: #24251f;
      color: #f3efe5;
    }

    .profile-item strong,
    .account-item strong,
    .stat strong,
    .goal strong {
      font-size: .88rem;
    }

    .profile-item span,
    .account-item span,
    .stat span,
    .goal span {
      color: var(--muted);
      font-size: .78rem;
    }

    .account-form {
      display: grid;
      gap: 8px;
      padding: 13px 15px 15px;
    }

    .account-form input {
      width: 100%;
      min-height: 38px;
      padding: 0 11px;
      border: 1px solid rgba(25,28,35,.14);
      border-radius: var(--radius);
      background: rgba(255,255,255,.62);
      color: var(--ink);
      font-weight: 750;
    }

    .account-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .account-actions button,
    .logout-btn {
      min-height: 38px;
      border: 1px solid rgba(25,28,35,.13);
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-weight: 950;
    }

    .account-actions button.secondary,
    .logout-btn {
      background: rgba(255,255,255,.62);
      color: var(--ink);
    }

    .account-note {
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.45;
    }

    :root[data-theme="dark"] .account-form input,
    :root[data-theme="dark"] .account-actions button.secondary,
    :root[data-theme="dark"] .logout-btn {
      border-color: rgba(243,239,229,.15);
      background: rgba(22,23,20,.78);
      color: #f3efe5;
    }

    .goal-meter {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(25,28,35,.1);
    }

    .goal-meter span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--green);
    }

    .xp-bar {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(25,28,35,.1);
    }

    .xp-bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--gold));
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 10;
      transform: translateX(-50%) translateY(24px);
      opacity: 0;
      pointer-events: none;
      min-width: min(420px, calc(100vw - 28px));
      padding: 12px 14px;
      border: 1px solid rgba(25,28,35,.14);
      border-radius: var(--radius);
      background: rgba(23,25,31,.96);
      color: #fff;
      box-shadow: var(--shadow);
      text-align: center;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .site-footer {
      width: min(1360px, 100%);
      margin: 22px auto 0;
      padding: 18px clamp(14px, 2.4vw, 30px) 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.6;
    }

    @media (max-width: 1120px) {
      .layout {
        grid-template-columns: minmax(290px, 360px) minmax(0, 1fr);
      }

      .side-stack {
        grid-column: 1 / -1;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 780px) {
      .topbar,
      .feed-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .layout,
      .side-stack,
      .feed {
        grid-template-columns: 1fr;
      }

      .split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1><a class="home-link" href="./index.html" aria-label="Again 2002 홈">Again 2002</a></h1>
        <p class="lead">
          <span>한국 축구, 팬들의 문제는 없는가?</span>
          <span>팬들의 목소리를 들어보겠습니다.</span>
        </p>
      </div>
      <div class="top-actions">
        <button class="signup-cta" id="signupShortcut" type="button">회원가입</button>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="다크모드로 전환" title="다크모드"></button>
        <div class="live-chip"><span class="dot"></span><span id="liveCount">1명 접속 중</span></div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-header">
          <h2>글쓰기</h2>
          <span class="mini">익명 번호 자동 부여</span>
        </div>
        <form id="postForm" class="composer">
          <div class="field">
            <label>작성 방식</label>
            <div class="mode-row" id="modeRow">
              <button type="button" class="active" data-mode="guest">비로그인</button>
              <button type="button" data-mode="member">로그인</button>
            </div>
          </div>
          <div class="composer-account is-hidden" id="composerAccount"></div>
          <div class="field" id="nicknameField">
            <label for="nickname">닉네임</label>
            <input id="nickname" maxlength="12" placeholder="붉은전술가" autocomplete="off" />
          </div>
          <div class="field" id="passwordField">
            <label for="postPassword">비밀번호</label>
            <input id="postPassword" type="password" maxlength="24" placeholder="삭제/수정용 비밀번호" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="message">목소리</label>
            <textarea id="message" maxlength="180" placeholder="오늘 경기에서 팬들이 답답했던 지점, 감독 운영, 선수 기용, 응원 문화까지 자유롭게 적어주세요."></textarea>
          </div>
          <div class="field">
            <label for="mediaFile">사진/영상</label>
            <input id="mediaFile" type="file" accept="image/*,video/*" />
            <span class="media-note" id="mediaStatus">선택 사항 · 5MB 이하</span>
          </div>
          <div class="field">
            <label>카테고리</label>
            <div class="category-row" id="categoryRow">
              <button type="button" class="active" data-category="sad">슬픔</button>
              <button type="button" data-category="anger">분노</button>
              <button type="button" data-category="hope">희망</button>
              <button type="button" data-category="joy">기쁨</button>
              <button type="button" data-category="fix">개선</button>
            </div>
          </div>
          <div class="field">
            <label>카드 스타일</label>
            <div class="style-row" id="styleRow">
              <button type="button" class="active" data-style="paper">기본</button>
              <button type="button" data-style="board">칠판</button>
              <button type="button" data-style="bold">강조</button>
            </div>
          </div>
          <div class="split">

              <label for="bgColor">배경색</label>

            <div class="field">
              <label for="textColor">글자색</label>

      <section>
        <div class="feed-head">
          <div class="feed-title">

          </div>

        </div>
        <div class="feed" id="feed"></div>

      <aside class="side-stack">
        <section class="panel">
          <div class="panel-header">

              <div>
                <div class="meter-score" id="heatScore">0</div>

              </div>
              <div class="mini" id="heatLabel">조용함</div>
            </div>
            <div class="bar"><span id="heatBar"></span></div>
          </div>

        <section class="panel">
          <div class="panel-header">
            <h2>작성자</h2>
            <span class="mini" id="profileCount">선택 없음</span>
          </div>
          <div class="profile" id="profile"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>오늘의 목표</h2>
            <span class="mini" id="goalSummary">0/3</span>
          </div>
          <ul class="goal-list" id="goals"></ul>
        </section>

        <section class="panel" id="accountPanel">
          <div class="panel-header">
            <h2>계정</h2>

          <div class="account" id="account"></div>
        </section>
      </aside>
    </section>
    <footer class="site-footer">
      이 웹사이트는 특정 개인에 대한 비난이나 비판을 종용하는 것이 아닌 한국 축구의 발전을 위한 목적으로 만들어진 웹사이트입니다.
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const storageKey = "again2002-feed-v1";
    const oldStorageKey = "coach-critique-feed-v1";
    const identityKey = "again2002-identity-v1";
    const registryKey = "again2002-author-registry-v1";
    const accountKey = "again2002-account-v1";
    const sessionKey = "again2002-session-v1";
    const themeKey = "again2002-theme-v1";
    const goalAwardKey = "again2002-goal-awards-v1";
    const reportKey = "again2002-reports-v1";
    const logoAsset = "./assets/again2002-logo.png";
    const maxMediaBytes = 5 * 1024 * 1024;
    const serviceConfig = {
      supabaseUrl: String(globalThis.AGAIN2002_CONFIG?.supabaseUrl || "").trim(),
      supabaseAnonKey: String(globalThis.AGAIN2002_CONFIG?.supabaseAnonKey || "").trim()
    };
    const goalXp = {
      likes10: 60,
      comments50: 110,
      posts3: 45
    };
    const slurWords = [
      "씨발", "시발", "ㅅㅂ", "ㅆㅂ", "개새끼", "새끼", "병신", "븅신", "등신", "멍청이",
      "좆", "존나", "졸라", "지랄", "꺼져", "닥쳐", "엿먹", "미친", "미쳤", "개같",
      "개판", "빡치", "쓰레기", "한심", "노답"
    ];
    const blockWords = ["살해", "죽이", "테러", "칼", "집주소", "전화번호", "가족", "주소", "번호"];
    const categories = {
      sad: "슬픔",
      anger: "분노",
      hope: "희망",
      joy: "기쁨",
      fix: "개선"
    };
    const styleDefaults = {
      paper: { bg: "#f8f3e7", fg: "#1d1c18" },
      board: { bg: "#36584a", fg: "#f4efdf" },
      bold: { bg: "#f4e8df", fg: "#1d1c18" }
    };
    const darkStyleDefaults = {
      paper: { bg: "#24251f", fg: "#f3efe5" },
      board: { bg: "#243f35", fg: "#f4efdf" },
      bold: { bg: "#332521", fg: "#f3efe5" }
    };

    const seedPosts = [
      seedPost("붉은전술가", 1, "paper", "#f8f3e7", "#1d1c18", "한국 축구가 늘 감독 한 명에게만 모든 감정을 쏟는 구조도 돌아봐야 한다. 그래도 오늘 교체 타이밍은 납득하기 어려웠다.", 28, [
        seedComment("상암메모장", 1, "동의. 비판은 해야 하는데 선수 보호도 같이 갔으면 좋겠음.")
      ], 7),
      seedPost("붉은전술가", 2, "board", "#36584a", "#f4efdf", "칠판에 다시 써보자. 압박이 풀릴 때 중원이 비는 문제, 왜 매번 같은 장면으로 보이는지 설명이 필요하다.", 19, [
        seedComment("라인관찰자", 1, "이건 진짜 경기마다 반복되는 느낌.")
      ], 18),
      seedPost("상암메모장", 1, "bold", "#f4e8df", "#1d1c18", "패배보다 답답한 건 대화가 없다는 점이다. 팬들이 묻는 질문에 축구적으로 답하는 장면이 더 많아졌으면 한다.", 34, [], 31),
      seedPost("라인관찰자", 1, "paper", "#eef1eb", "#1d1c18", "팬들도 감정만 던지는 문화에서 벗어날 필요가 있다. 대신 대표팀 운영은 더 구체적으로 검증받아야 한다.", 22, [], 49)
    ];

    let posts = loadPosts();
    let selectedStyle = "paper";
    let selectedCategory = "sad";
    let currentAccount = loadSessionAccount();
    let currentMode = currentAccount ? "member" : "guest";
    let activeAuthorId = null;
    let onlineCount = 1;
    let presenceMode = serviceConfig.supabaseUrl && serviceConfig.supabaseAnonKey ? "connecting" : "local";
    let serviceClient = null;
    let remoteRefreshTimer = null;

    const feed = document.querySelector("#feed");
    const postForm = document.querySelector("#postForm");
    const toast = document.querySelector("#toast");
    const notice = document.querySelector("#notice");
    const nicknameInput = document.querySelector("#nickname");
    const passwordInput = document.querySelector("#postPassword");
    const nicknameField = document.querySelector("#nicknameField");
    const passwordField = document.querySelector("#passwordField");
    const composerAccount = document.querySelector("#composerAccount");
    const mediaInput = document.querySelector("#mediaFile");
    const mediaStatus = document.querySelector("#mediaStatus");
    const bgColorInput = document.querySelector("#bgColor");
    const textColorInput = document.querySelector("#textColor");
    const clearFilter = document.querySelector("#clearFilter");
    const themeToggle = document.querySelector("#themeToggle");
    const signupShortcut = document.querySelector("#signupShortcut");

    applyStoredTheme();
    hydrateComposerAccount();
    setMode(currentMode);

    document.querySelectorAll("#styleRow button").forEach((button) => {
      button.addEventListener("click", () => {
        selectedStyle = button.dataset.style;
        document.querySelectorAll("#styleRow button").forEach((item) => item.classList.toggle("active", item === button));
        applyStyleDefaults(selectedStyle);
      });
    });

    document.querySelectorAll("#categoryRow button").forEach((button) => {
      button.addEventListener("click", () => {
        selectedCategory = normalizeCategory(button.dataset.category);
        document.querySelectorAll("#categoryRow button").forEach((item) => item.classList.toggle("active", item === button));
      });
    });

    document.querySelectorAll("#modeRow button").forEach((button) => {
      button.addEventListener("click", () => {
        setMode(button.dataset.mode);
      });
    });

    themeToggle.addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      setTheme(next);
    });

    signupShortcut.addEventListener("click", () => {
      setMode("member");
      document.querySelector("#accountPanel").scrollIntoView({ behavior: "smooth", block: "start" });
      requestAnimationFrame(() => {
        const firstAccountField = document.querySelector("#signupDisplayName, #accountNick, #composerLoginEmail");
        if (firstAccountField) firstAccountField.focus({ preventScroll: true });
      });
    });

    clearFilter.addEventListener("click", () => {
      activeAuthorId = null;
      render();
    });

    [nicknameInput, passwordInput].forEach((input) => {
      input.addEventListener("input", () => renderAccount());
    });

    mediaInput.addEventListener("change", () => {
      const file = mediaInput.files?.[0];
      if (!file) {
        mediaStatus.textContent = "선택 사항 · 5MB 이하";
        return;
      }
      if (!isAllowedMedia(file)) {
        mediaStatus.textContent = "사진 또는 영상 파일만 올릴 수 있습니다.";
        mediaInput.value = "";
        return;
      }
      if (file.size > maxMediaBytes) {
        mediaStatus.textContent = "5MB 이하 파일만 올릴 수 있습니다.";
        mediaInput.value = "";
        return;
      }
      mediaStatus.textContent = `${file.name} · ${formatBytes(file.size)}`;
    });

    postForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const rawText = document.querySelector("#message").value.trim();
      const validation = validateText(rawText);
      if (!validation.ok) {
        notice.textContent = validation.message;
        pulseNotice();
        return;
      }

      const password = passwordInput.value.trim();
      if (currentMode === "member" && !currentAccount) {
        notice.textContent = "계정 패널에서 먼저 가입하거나 로그인해주세요.";
        pulseNotice();
        return;
      }
      if (currentMode === "guest" && !password) {
        notice.textContent = "비밀번호를 입력해주세요.";
        pulseNotice();
        return;
      }
      const author = resolveAuthor(nicknameInput.value.trim() || "익명팬", password, currentMode);
      const colors = currentStyleDefaults()[selectedStyle] || currentStyleDefaults().paper;
      let media = null;
      try {
        media = await readSelectedMedia();
      } catch {
        showToast("첨부 파일을 읽을 수 없습니다.");
        return;
      }
      const post = {
        id: makeId(),
        authorId: author.id,
        authorBase: author.base,
        authorName: author.name,
        authorType: author.type,
        authorIp: author.ip,
        authorLevel: author.level || 0,
        authorVerified: author.verified === true,
        style: selectedStyle,
        category: selectedCategory,
        bgColor: safeHex(bgColorInput.value, colors.bg),
        textColor: safeHex(textColorInput.value, colors.fg),
        text: censor(rawText),
        media,
        likes: 0,
        comments: [],
        createdAt: Date.now()
      };

      posts.unshift(post);
      posts = posts.slice(0, 80);
      await persistPost(post);
      postForm.reset();
      hydrateComposerAccount();
      selectedStyle = "paper";
      selectedCategory = "sad";
      document.querySelectorAll("#styleRow button").forEach((item) => item.classList.toggle("active", item.dataset.style === "paper"));
      document.querySelectorAll("#categoryRow button").forEach((item) => item.classList.toggle("active", item.dataset.category === "sad"));
      applyStyleDefaults("paper");
      mediaStatus.textContent = "선택 사항 · 5MB 이하";
      notice.textContent = `${author.name}으로 올라갔습니다.`;
      showToast("피드에 올라갔습니다.");
      render();
    });

    function seedPost(base, number, style, bgColor, textColor, text, likes, comments, minutesAgo) {
      return {
        id: makeId(),
        authorId: `seed-${base}-${number}`,
        authorBase: base,
        authorName: `${base}${number}`,
        authorType: "member",
        authorIp: "",
        authorLevel: number === 1 ? 2 : 1,
        authorVerified: true,
        style,
        category: number === 1 ? "fix" : "anger",
        bgColor,
        textColor,
        text: escapeHtml(text),
        likes,
        comments,
        createdAt: Date.now() - minutesAgo * 60000
      };
    }

    function seedComment(base, number, text) {
      return {
        id: makeId(),
        authorId: `seed-${base}-${number}`,
        authorBase: base,
        authorName: `${base}${number}`,
        authorType: "member",
        authorIp: "",
        authorLevel: 1,
        authorVerified: true,
        text: escapeHtml(text),
        createdAt: Date.now() - 5 * 60000
      };
    }

    function loadPosts() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (Array.isArray(saved) && saved.length) return normalizePosts(saved);
        const old = JSON.parse(localStorage.getItem(oldStorageKey) || "null");
        if (Array.isArray(old) && old.length) return normalizePosts(old.map(convertOldPost));
        return normalizePosts(seedPosts);
      } catch {
        return normalizePosts(seedPosts);
      }
    }

    function convertOldPost(post, index) {
      const base = String(post.nick || "익명팬").replace(/<[^>]*>/g, "").replace(/\d+$/, "") || "익명팬";
      return {
        id: post.id || makeId(),
        authorId: `old-${index + 1}-${makeId()}`,
        authorBase: base,
        authorName: `${base}${index + 1}`,
        authorType: "guest",
        authorIp: maskedIp(),
        authorLevel: 0,
        authorVerified: false,
        style: post.theme === "chalk" ? "board" : "paper",
        category: "anger",
        bgColor: remapLegacyColor(post.bgColor || "#f8f3e7"),
        textColor: remapLegacyColor(post.textColor || "#1d1c18"),
        text: post.text || "",
        media: null,
        likes: Array.isArray(post.reactions) ? post.reactions[0] || 0 : 0,
        comments: [],
        createdAt: post.createdAt || Date.now()
      };
    }

    function normalizePosts(items) {
      return items.map((post, index) => {
        const style = ["paper", "board", "bold"].includes(post.style) ? post.style : "paper";
        const colors = styleDefaults[style];
        const base = escapeHtml(String(post.authorBase || post.nick || "익명팬").replace(/<[^>]*>/g, "").replace(/\d+$/, "") || "익명팬");
        const authorName = escapeHtml(post.authorName || `${base}${index + 1}`);
        return {
          id: post.id || makeId(),
          authorId: post.authorId || `legacy-${index}`,
          authorBase: base,
          authorName,
          authorType: post.authorType === "member" ? "member" : "guest",
          authorIp: post.authorIp || (post.authorType === "member" ? "" : maskedIp()),
          authorLevel: Number.isFinite(post.authorLevel) ? post.authorLevel : (post.authorType === "member" ? 1 : 0),
          authorVerified: post.authorVerified === true || post.authorType === "member",
          style,
          category: normalizeCategory(post.category),
          bgColor: safeHex(remapLegacyColor(post.bgColor), colors.bg),
          textColor: safeHex(remapLegacyColor(post.textColor), colors.fg),
          text: post.text || "",
          media: normalizeMedia(post.media),
          likes: Number.isFinite(post.likes) ? post.likes : 0,
          comments: Array.isArray(post.comments) ? post.comments.map(normalizeComment) : [],
          createdAt: post.createdAt || Date.now()
        };
      });
    }

    function normalizeComment(comment, index) {
      const base = escapeHtml(String(comment.authorBase || "익명팬").replace(/<[^>]*>/g, "").replace(/\d+$/, "") || "익명팬");
      return {
        id: comment.id || makeId(),
        authorId: comment.authorId || `comment-${index}`,
        authorBase: base,
        authorName: escapeHtml(comment.authorName || `${base}${index + 1}`),
        authorType: comment.authorType === "member" ? "member" : "guest",
        authorIp: comment.authorIp || (comment.authorType === "member" ? "" : maskedIp()),
        authorLevel: Number.isFinite(comment.authorLevel) ? comment.authorLevel : (comment.authorType === "member" ? 1 : 0),
        authorVerified: comment.authorVerified === true || comment.authorType === "member",
        text: comment.text || "",
        createdAt: comment.createdAt || Date.now()
      };
    }

    function normalizeMedia(media) {
      if (!media || typeof media !== "object") return null;
      const type = media.type === "video" ? "video" : media.type === "image" ? "image" : "";
      const url = String(media.url || "");
      if (!type || !url.startsWith("data:")) return null;
      return {
        type,
        url,
        name: escapeHtml(media.name || (type === "video" ? "첨부 영상" : "첨부 사진")),
        size: Number.isFinite(media.size) ? media.size : 0
      };
    }

    function savePosts() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(posts));
      } catch {
        const lightweightPosts = posts.map((post) => ({ ...post, media: null }));
        try {
          localStorage.setItem(storageKey, JSON.stringify(lightweightPosts));
        } catch {}
      }
    }

    function resolveAuthor(rawBase, password, mode) {
      if (mode === "member" && currentAccount) {
        const registry = loadRegistry();
        const key = `member::${currentAccount.id}`;
        registry.authors[key] = {
          id: currentAccount.id,
          base: currentAccount.nick,
          number: "",
          name: currentAccount.nick,
          type: "member",
          ip: "",
          level: currentAccount.level || 1,
          verified: true
        };
        localStorage.setItem(registryKey, JSON.stringify(registry));
        return registry.authors[key];
      }

      const base = normalizeNick(rawBase);
      const clientId = getClientId();
      const registry = loadRegistry();
      const safePassword = simpleHash(`${base}:${password}`);
      const key = `${mode}::${base}::${mode === "member" ? safePassword : clientId}`;
      registry.counts[base] = registry.counts[base] || existingMaxNumber(base);
      if (!registry.authors[key]) {
        if (mode === "guest") registry.counts[base] += 1;
        const account = mode === "member" ? loadAccount(base, safePassword) : null;
        const number = mode === "member" ? "" : registry.counts[base];
        registry.authors[key] = {
          id: mode === "member" ? `member-${safePassword}` : `guest-${registry.counts[base]}-${clientId}`,
          base,
          number,
          name: mode === "member" ? base : `${base}${number}`,
          type: mode,
          ip: mode === "member" ? "" : maskedIp(),
          level: account?.level || 1,
          verified: mode === "member"
        };
        localStorage.setItem(registryKey, JSON.stringify(registry));
      }
      const author = registry.authors[key];
      if (mode === "member") {
        const account = ensureAccount(base, safePassword);
        author.name = account.nick;
        author.level = account.level;
        author.verified = true;
        author.type = "member";
        author.ip = "";
        localStorage.setItem(registryKey, JSON.stringify(registry));
      }
      return author;
    }

    function existingMaxNumber(base) {
      const re = new RegExp(`^${escapeRegExp(base)}(\\d+)$`);
      return posts.reduce((max, post) => {
        const match = String(post.authorName || "").match(re);
        return match ? Math.max(max, Number(match[1])) : max;
      }, 0);
    }

    function getClientId() {
      let id = localStorage.getItem(identityKey);
      if (!id) {
        id = makeId();
        localStorage.setItem(identityKey, id);
      }
      return id;
    }

    function loadRegistry() {
      try {
        const registry = JSON.parse(localStorage.getItem(registryKey) || "null");
        if (registry && registry.counts && registry.authors) return registry;
      } catch {}
      return { counts: {}, authors: {} };
    }

    function normalizeNick(raw) {
      return escapeHtml(String(raw || "익명팬").replace(/\s+/g, "").replace(/\d+$/, "").slice(0, 12) || "익명팬");
    }

    function loadAccounts() {
      try {
        const accounts = JSON.parse(localStorage.getItem(accountKey) || "null");
        if (accounts && typeof accounts === "object") return accounts;
      } catch {}
      return {};
    }

    function loadAccount(nick, passwordHash) {
      const base = normalizeNick(nick);
      return loadAccounts()[`member-${simpleHash(`${base}:${passwordHash}`)}`] || loadAccounts()[`member-${passwordHash}`] || null;
    }

    function ensureAccount(nick, passwordHash) {
      const base = normalizeNick(nick);
      const accounts = loadAccounts();
      const id = `member-${passwordHash}`;
      if (!accounts[id]) {
        accounts[id] = {
          id,
          nick: base,
          passwordHash,
          level: 1,
          xp: 0,
          createdAt: Date.now()
        };
        localStorage.setItem(accountKey, JSON.stringify(accounts));
      }
      return accounts[id];
    }

    function saveAccount(account) {
      if (account?.source === "remote" && serviceClient) {
        serviceClient.from("profiles")
          .update({ level: account.level || 1, xp: account.xp || 0, updated_at: new Date().toISOString() })
          .eq("id", account.authId)
          .then(() => {});
        return;
      }
      const accounts = loadAccounts();
      accounts[account.id] = account;
      localStorage.setItem(accountKey, JSON.stringify(accounts));
    }

    function loadSessionAccount() {
      try {
        const session = JSON.parse(localStorage.getItem(sessionKey) || "null");
        if (!session?.id) return null;
        return loadAccounts()[session.id] || null;
      } catch {
        return null;
      }
    }

    function saveSessionAccount(account) {
      currentAccount = account;
      if (account.source !== "remote") {
        localStorage.setItem(sessionKey, JSON.stringify({ id: account.id }));
      }
      hydrateComposerAccount();
      setMode("member");
      showToast(`${account.nick}으로 로그인했습니다.`);
    }

    async function clearSessionAccount() {
      if (currentAccount?.source === "remote" && serviceClient) {
        await serviceClient.auth.signOut();
      }
      currentAccount = null;
      localStorage.removeItem(sessionKey);
      setMode("guest");
      showToast("로그아웃했습니다.");
    }

    function accountHash(nick, password) {
      const base = normalizeNick(nick);
      return simpleHash(`${base}:${password}`);
    }

    async function createMemberAccount(nick, password, options = {}) {
      const displayName = normalizeDisplayName(nick);
      const base = normalizeNick(displayName);
      if (!displayName || base === "익명팬") return { ok: false, message: "닉네임을 입력해주세요." };
      if (password.length < 4) return { ok: false, message: "비밀번호는 4자 이상으로 해주세요." };

      if (serviceClient) {
        const email = String(options.email || "").trim();
        const username = accountUsername(email, displayName);
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return { ok: false, message: "이메일을 정확히 입력해주세요." };
        if (password.length < 6) return { ok: false, message: "DB 계정 비밀번호는 6자 이상으로 해주세요." };

        const { data, error } = await serviceClient.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: authRedirectUrl(),
            data: {
              username,
              display_name: displayName
            }
          }
        });

        if (error) return { ok: false, message: error.message };
        if (!data.session) return { ok: true, pendingEmail: true, message: "인증 메일을 보냈습니다. 메일 링크를 누른 뒤 Again 2002로 돌아와 로그인해주세요." };

        const account = await accountFromUser(data.user);
        return { ok: true, account };
      }

      const passwordHash = accountHash(base, password);
      const existing = loadAccount(base, passwordHash);
      if (existing) return { ok: false, message: "이미 있는 계정입니다. 로그인 버튼을 눌러주세요." };
      const account = ensureAccount(base, passwordHash);
      return { ok: true, account };
    }

    function accountUsername(email, displayName) {
      const raw = String(email || displayName || "fan").split("@")[0];
      const slug = raw.replace(/[^a-zA-Z0-9_]/g, "").slice(0, 8) || "fan";
      return `${slug}_${simpleHash(`${email}:${displayName}`).slice(0, 6)}`.slice(0, 16);
    }

    async function loginMemberAccount(nick, password, options = {}) {
      const base = normalizeNick(nick);
      if (!password) return { ok: false, message: "비밀번호를 입력해주세요." };

      if (serviceClient) {
        const email = String(options.email || "").trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return { ok: false, message: "로그인은 이메일과 비밀번호로 해주세요." };
        const { data, error } = await serviceClient.auth.signInWithPassword({ email, password });
        if (error) return { ok: false, message: error.message };
        const account = await accountFromUser(data.user);
        return { ok: true, account };
      }

      if (!base || base === "익명팬") return { ok: false, message: "닉네임을 입력해주세요." };
      const account = loadAccount(base, accountHash(base, password));
      if (!account) return { ok: false, message: "계정이 없거나 비밀번호가 다릅니다." };
      return { ok: true, account };
    }

    function authRedirectUrl() {
      const origin = window.location.origin;
      const host = window.location.hostname || "";
      if (host === "again2002.com" || host === "www.again2002.com") return `${origin}/`;
      if (!origin || origin === "null" || origin.startsWith("file:")) return "https://again2002.com/";
      return "https://again2002.com/";
    }

    function handleAuthReturnNotice() {
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const searchParams = new URLSearchParams(window.location.search);
      const hasAuthSignal = searchParams.has("code")
        || searchParams.has("type")
        || searchParams.has("error")
        || hashParams.has("access_token")
        || hashParams.has("type")
        || hashParams.has("error");

      if (!hasAuthSignal) return;

      const rawError = searchParams.get("error_description") || hashParams.get("error_description");
      setMode("member");
      if (rawError) {
        showToast(rawError.replace(/\+/g, " "));
      } else {
        const message = "이메일 인증이 완료됐습니다. Again 2002로 돌아가 로그인해주세요.";
        notice.textContent = message;
        showToast(message);
      }

      if (window.history?.replaceState) {
        window.history.replaceState({}, document.title, window.location.pathname || "/");
      }
    }

    function normalizeDisplayName(raw) {
      return escapeHtml(String(raw || "").trim().replace(/\s+/g, " ").slice(0, 16));
    }

    async function accountFromUser(user) {
      if (!user || !serviceClient) return null;
      const metadata = user.user_metadata || {};
      let profile = null;
      const result = await serviceClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      profile = result.data;
      if (!profile) {
        const fallbackUserName = normalizeNick(metadata.username || user.email?.split("@")[0] || "fan");
        const fallbackDisplay = normalizeDisplayName(metadata.display_name || fallbackUserName);
        const upsert = await serviceClient
          .from("profiles")
          .upsert({
            id: user.id,
            username: fallbackUserName,
            display_name: fallbackDisplay,
            level: 1,
            xp: 0,
            updated_at: new Date().toISOString()
          })
          .select("*")
          .maybeSingle();
        profile = upsert.data;
      }

      return {
        id: `auth-${user.id}`,
        authId: user.id,
        source: "remote",
        username: normalizeNick(profile?.username || metadata.username || user.email?.split("@")[0] || "fan"),
        nick: normalizeDisplayName(profile?.display_name || metadata.display_name || profile?.username || user.email?.split("@")[0] || "fan"),
        email: user.email || "",
        level: profile?.level || 1,
        xp: profile?.xp || 0,
        createdAt: user.created_at ? Date.parse(user.created_at) : Date.now()
      };
    }

    function hydrateComposerAccount() {
      if (currentAccount) nicknameInput.value = currentAccount.nick;
      passwordInput.value = "";
      updateComposerIdentity();
    }

    function setMode(mode) {
      currentMode = mode === "member" ? "member" : "guest";
      document.querySelectorAll("#modeRow button").forEach((item) => item.classList.toggle("active", item.dataset.mode === currentMode));
      document.querySelector("#accountMode").textContent = currentAccount ? "로그인" : "회원가입";
      updateComposerIdentity();
      renderAccount();
    }

    function updateComposerIdentity() {
      const isLoggedInComposer = currentMode === "member" && currentAccount;
      const isMemberWaiting = currentMode === "member" && !currentAccount;
      nicknameField.classList.toggle("is-hidden", !!isLoggedInComposer || isMemberWaiting);
      passwordField.classList.toggle("is-hidden", !!isLoggedInComposer || isMemberWaiting);
      composerAccount.classList.toggle("is-hidden", currentMode !== "member");
      if (currentMode !== "member") {
        composerAccount.innerHTML = "";
        return;
      }
      if (currentAccount) {
        const account = currentAccount.source === "remote" ? currentAccount : (loadAccounts()[currentAccount.id] || currentAccount);
        composerAccount.innerHTML = `
          <strong><span class="${levelClass(account.level)}">${account.nick}</span> Lv.${account.level}</strong>
          <span>이 계정으로 카드와 댓글이 올라갑니다.</span>
        `;
        return;
      }
      composerAccount.innerHTML = `
        <strong>로그인이 필요합니다</strong>
        <span>가입한 이메일과 비밀번호로 로그인해주세요.</span>
        <div class="composer-login">
          <input id="composerLoginEmail" type="email" maxlength="80" placeholder="가입한 이메일" autocomplete="email" />
          <input id="composerLoginPassword" type="password" maxlength="48" placeholder="비밀번호" autocomplete="current-password" />
          <button id="composerLoginButton" type="button">로그인</button>
        </div>
      `;
      bindComposerLogin();
    }

    function bindComposerLogin() {
      const loginButton = document.querySelector("#composerLoginButton");
      const emailInput = document.querySelector("#composerLoginEmail");
      const passwordInput = document.querySelector("#composerLoginPassword");
      if (!loginButton || !emailInput || !passwordInput) return;
      loginButton.addEventListener("click", async () => {
        const result = await loginMemberAccount("", passwordInput.value.trim(), {
          email: emailInput.value
        });
        if (!result.ok) {
          showToast(result.message);
          return;
        }
        saveSessionAccount(result.account);
      });
    }

    function syncMemberAuthor(account) {
      posts.forEach((post) => {
        if (post.authorId === account.id) {
          post.authorLevel = account.level;
          post.authorVerified = true;
        }
        post.comments.forEach((comment) => {
          if (comment.authorId === account.id) {
            comment.authorLevel = account.level;
            comment.authorVerified = true;
          }
        });
      });
      savePosts();
    }

    function loadGoalAwards() {
      try {
        const awards = JSON.parse(localStorage.getItem(goalAwardKey) || "null");
        if (awards && typeof awards === "object") return awards;
      } catch {}
      return {};
    }

    function xpForNext(level) {
      const lv = Math.max(1, Number(level || 1));
      if (lv < 5) return 70 + lv * 20;
      if (lv < 10) return 170 + (lv - 5) * 45;
      if (lv < 20) return 420 + (lv - 10) * 85;
      if (lv < 30) return 1250 + (lv - 20) * 150;
      return 3000 + (lv - 30) * 260;
    }

    function validateText(text) {
      if (text.length < 8) return { ok: false, message: "조금 더 구체적으로 써주세요." };
      if (blockWords.some((word) => text.includes(word))) return { ok: false, message: "위협, 개인정보, 가족 언급은 올릴 수 없습니다." };
      return { ok: true };
    }

    function censor(text) {
      let output = escapeHtml(text);
      slurWords.forEach((word) => {
        const compactPattern = [...word].map((char) => `${escapeRegExp(char)}+`).join("[\\s\\W_]*");
        output = output.replace(new RegExp(compactPattern, "gi"), `<span class="censored">${"삐".repeat(Math.min(3, word.length))}</span>`);
      });
      return output;
    }

    function isAllowedMedia(file) {
      return file && (file.type.startsWith("image/") || file.type.startsWith("video/"));
    }

    async function readSelectedMedia() {
      const file = mediaInput.files?.[0];
      if (!file) return null;
      if (!isAllowedMedia(file) || file.size > maxMediaBytes) return null;
      const url = await readFileAsDataUrl(file);
      return {
        type: file.type.startsWith("video/") ? "video" : "image",
        url,
        name: escapeHtml(file.name),
        size: file.size
      };
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function formatBytes(bytes) {
      if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)}KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)}MB`;
    }

    function render() {
      const visiblePosts = activeAuthorId ? posts.filter((post) => post.authorId === activeAuthorId || post.comments.some((comment) => comment.authorId === activeAuthorId)) : posts;
      feed.innerHTML = visiblePosts.map(cardTemplate).join("");
      document.querySelectorAll(".like-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          const post = posts.find((item) => item.id === button.closest(".card").dataset.id);
          if (!post) return;
          post.likes += 1;
          await persistLike(post);
          render();
        });
      });
      document.querySelectorAll(".comment-toggle").forEach((button) => {
        button.addEventListener("click", () => {
          const box = button.closest(".card").querySelector(".comments");
          box.classList.toggle("open");
        });
      });
      document.querySelectorAll(".share-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          const post = posts.find((item) => item.id === button.closest(".card").dataset.id);
          if (!post) return;
          await sharePostImage(post);
        });
      });
      document.querySelectorAll(".report-btn").forEach((button) => {
        button.addEventListener("click", async () => {
          const post = posts.find((item) => item.id === button.closest(".card").dataset.id);
          if (!post) return;
          await reportPost(post);
        });
      });
      document.querySelectorAll(".comment-form").forEach((form) => {
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const post = posts.find((item) => item.id === form.closest(".card").dataset.id);
          const input = form.querySelector("input");
          const text = input.value.trim();
          const validation = validateComment(text);
          if (!post || !validation.ok) {
            showToast(validation.message || "댓글을 등록할 수 없습니다.");
            return;
          }
          const password = passwordInput.value.trim();
          if (currentMode === "member" && !currentAccount) {
            showToast("계정 패널에서 먼저 가입하거나 로그인해주세요.");
            return;
          }
          if (currentMode === "guest" && !password) {
            showToast("댓글도 비밀번호가 필요합니다.");
            return;
          }
          const author = resolveAuthor(nicknameInput.value.trim() || "익명팬", password, currentMode);
          const comment = {
            id: makeId(),
            authorId: author.id,
            authorBase: author.base,
            authorName: author.name,
            authorType: author.type,
            authorIp: author.ip,
            authorLevel: author.level || 0,
            authorVerified: author.verified === true,
            text: censor(text),
            createdAt: Date.now()
          };
          post.comments.push(comment);
          input.value = "";
          await persistComment(post.id, comment);
          render();
        });
      });
      document.querySelectorAll(".author-btn, .comment-author").forEach((button) => {
        button.addEventListener("click", () => {
          activeAuthorId = button.dataset.author;
          render();
        });
      });
      renderStats();
      renderProfile();
      renderGoals();
      renderAccount();
    }

    function validateComment(text) {
      if (text.length < 2) return { ok: false, message: "댓글을 조금 더 써주세요." };
      if (blockWords.some((word) => text.includes(word))) return { ok: false, message: "위험한 표현은 댓글로 남길 수 없습니다." };
      return { ok: true };
    }

    function cardTemplate(post) {
      const comments = post.comments || [];
      return `
        <article class="card ${post.style}" data-id="${escapeAttr(post.id)}" style="--card-bg:${safeHex(post.bgColor, styleDefaults[post.style].bg)};--card-fg:${safeHex(post.textColor, styleDefaults[post.style].fg)}">
          <div class="card-main">
            <div class="card-meta">
              <button class="author-btn" type="button" data-author="${escapeAttr(post.authorId)}">${authorLabel(post)}</button>
              <span>${relativeTime(post.createdAt)}</span>
            </div>
            <p class="message">${post.text}</p>
            ${mediaTemplate(post.media)}
            <div class="card-meta">
              <span>${categoryName(post.category)}</span>
              <span>댓글 ${comments.length}</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="react like-btn" type="button">공감 ${post.likes}</button>
            <button class="react comment-toggle" type="button">댓글 ${comments.length}</button>
            <button class="react share-btn" type="button">공유</button>
          </div>
          <button class="report-btn" type="button" title="운영진에게 신고" aria-label="운영진에게 신고">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3.5A1.5 1.5 0 0 1 6.5 2h10.2c1.3 0 2 1.5 1.2 2.5L15.5 7l2.4 2.5c.8 1 .1 2.5-1.2 2.5H7v8.5a1.5 1.5 0 0 1-3 0v-17Z"/></svg>
          </button>
          <div class="comments">
            <div class="comment-list">
              ${comments.length ? comments.map(commentTemplate).join("") : `<div class="comment"><span>아직 댓글이 없습니다.</span></div>`}
            </div>
            <form class="comment-form">
              <input maxlength="80" placeholder="댓글 쓰기" />
              <button type="submit">등록</button>
            </form>
          </div>
        </article>
      `;
    }

    function mediaTemplate(media) {
      const safeMedia = normalizeMedia(media);
      if (!safeMedia) return "";
      if (safeMedia.type === "image") {
        return `<div class="card-media"><img src="${escapeAttr(safeMedia.url)}" alt="${escapeAttr(safeMedia.name)}" loading="lazy" /></div>`;
      }
      return `
        <div class="card-media">
          <video src="${escapeAttr(safeMedia.url)}" controls playsinline preload="metadata"></video>
          <span class="media-badge">영상 · ${safeMedia.name}</span>
        </div>
      `;
    }

    function commentTemplate(comment) {
      return `

        const blob = await createShareImageBlob(post);

          await navigator.share({

          });
          return;

        downloadBlob(blob, `again2002-${post.id}.png`);

    async function reportPost(post) {
      const reports = loadReports();
      if (reports[post.id]) {
        showToast("이미 신고한 카드입니다.");
        return;
      }

      const report = {
        id: makeId(),
        postId: post.id,
        reporterId: getClientId(),
        reason: "card-report",
        createdAt: Date.now()
      };
      reports[post.id] = report.id;
      localStorage.setItem(reportKey, JSON.stringify(reports));
      await persistReport(report).catch(() => {});
      showToast("운영진에게 신고가 접수됐습니다.");

    function loadReports() {
      try {
        const reports = JSON.parse(localStorage.getItem(reportKey) || "null");
        if (reports && typeof reports === "object") return reports;
      } catch {}
      return {};
    }

    async function createShareImageBlob(post) {
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1920;
      const ctx = canvas.getContext("2d");
      const logo = await loadLogoImage().catch(() => null);
      const mediaImage = post.media?.type === "image" ? await loadDataImage(post.media.url).catch(() => null) : null;
      drawShareImage(ctx, post, canvas.width, canvas.height, logo, mediaImage);
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("empty image")), "image/png", 0.95);
      });
    }

    function loadLogoImage() {
      if (loadLogoImage.cache) return Promise.resolve(loadLogoImage.cache);
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => {
          loadLogoImage.cache = image;
          resolve(image);
        };
        image.onerror = reject;
        image.src = logoAsset;
      });
    }

    function loadDataImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

      ctx.lineWidth = 2;
      for (let x = 0; x < width; x += 72) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for (let y = 0; y < height; y += 72) {
        ctx.beginPath();
        ctx.moveTo(0, y);

      }

      drawRoundedRect(ctx, 82, 345, 916, 1045, 34, bg);

      ctx.lineWidth = 4;
      drawRoundedStroke(ctx, 82, 345, 916, 1045, 34);

      if (post.style === "board") {

        }
        for (let y = 410; y < 1335; y += 58) {

      ctx.fillStyle = fg;

      const category = categoryName(post.category);

      drawRoundedRect(ctx, 945 - pillWidth, 392, pillWidth, 50, 25, "rgba(73,108,88,.14)");
      ctx.fillStyle = fg;

      ctx.font = "800 25px Pretendard, Arial, sans-serif";
      ctx.fillStyle = mixColor(fg, "#777777", .38);
      ctx.fillText(post.authorType === "member" ? `Lv.${post.authorLevel || 1}` : `IP ${post.authorIp || maskedIp()}`, 135, 470);

      ctx.strokeStyle = "rgba(29,28,24,.16)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(135, 522);
      ctx.lineTo(945, 522);
      ctx.stroke();

      ctx.fillStyle = fg;

        ? "900 58px 'Segoe Print', 'Comic Sans MS', cursive"

      wrapCanvasText(ctx, stripTags(post.text), 135, 625, 810, 78, hasMedia ? 4 : 7);

      if (mediaImage) {
        drawCoverImage(ctx, mediaImage, 135, 900, 810, 260, 22);
      } else if (post.media?.type === "video") {
        drawRoundedRect(ctx, 135, 900, 810, 170, 22, "rgba(29,28,24,.08)");
        ctx.fillStyle = fg;
        ctx.font = "900 42px Pretendard, Arial, sans-serif";
        ctx.fillText("영상 포함", 180, 985);

        ctx.fillText(stripTags(post.media.name || "첨부 영상"), 180, 1030);
      }

      ctx.strokeStyle = "rgba(29,28,24,.13)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(135, 1208);
      ctx.lineTo(945, 1208);
