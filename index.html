    function drawRoundedRect(ctx, x, y, width, height, radius, fill) {
      roundedPath(ctx, x, y, width, height, radius);
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function drawRoundedStroke(ctx, x, y, width, height, radius) {
      roundedPath(ctx, x, y, width, height, radius);
      ctx.stroke();
    }

    function drawCoverImage(ctx, image, x, y, width, height, radius) {
      const scale = Math.max(width / image.width, height / image.height);
      const drawWidth = image.width * scale;
      const drawHeight = image.height * scale;
      const dx = x + (width - drawWidth) / 2;
      const dy = y + (height - drawHeight) / 2;
      ctx.save();
      roundedPath(ctx, x, y, width, height, radius);
      ctx.clip();
      ctx.drawImage(image, dx, dy, drawWidth, drawHeight);
      ctx.restore();
      ctx.strokeStyle = "rgba(29,28,24,.13)";
      ctx.lineWidth = 3;
      drawRoundedStroke(ctx, x, y, width, height, radius);
    }

    function roundedPath(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text || "").split(/\s+/).flatMap((word) => {
        if (ctx.measureText(word).width <= maxWidth) return [word];
        return [...word];
      });
      let line = "";
      let lineCount = 0;
      for (const word of words) {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          if (lineCount >= maxLines - 1) {
            ctx.fillText(`${line.slice(0, Math.max(0, line.length - 1))}...`, x, y + lineCount * lineHeight);
            return;
          }
          ctx.fillText(line, x, y + lineCount * lineHeight);
          line = word;
          lineCount += 1;
          continue;
        }
        line = test;
      }
      if (lineCount < maxLines) {
        ctx.fillText(line, x, y + lineCount * lineHeight);
      }
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
    }

    function mixColor(color, fallback) {
      return /^#[0-9a-f]{6}$/i.test(color) ? color : fallback;
    }

    function renderStats() {
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);
      const todaysPosts = posts.filter((post) => post.createdAt >= todayStart.getTime());
      const commentCount = posts.reduce((sum, post) => sum + post.comments.length, 0);
      const todayComments = posts.reduce((sum, post) => {
        return sum + post.comments.filter((comment) => comment.createdAt >= todayStart.getTime()).length;
      }, 0);
      const online = Math.max(1, onlineCount);
      const heat = Math.min(100, Math.round(16 + online * 3 + todaysPosts.length * 4 + todayComments * 1.5));
      document.querySelector("#heatScore").textContent = heat;
      document.querySelector("#heatBar").style.width = `${heat}%`;
      document.querySelector("#onlineText").textContent = presenceMode === "live"
        ? `실시간 접속 ${online.toLocaleString("ko-KR")}명`
        : "현재 이 브라우저 1명 접속 중";
      document.querySelector("#heatLabel").textContent = heat > 78 ? "매우 활발" : heat > 52 ? "활발" : "조용함";
      document.querySelector("#liveCount").textContent = `${online.toLocaleString("ko-KR")}명 접속 중`;
      document.querySelector("#feedMeta").textContent = `오늘 ${todaysPosts.length}개 · 댓글 ${commentCount}개`;
    }

    async function initService() {
      if (!serviceConfig.supabaseUrl || !serviceConfig.supabaseAnonKey) {
        presenceMode = "local";
        renderStats();
        return;
      }

      try {
        const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm");
        serviceClient = createClient(serviceConfig.supabaseUrl, serviceConfig.supabaseAnonKey);
        await initAuth();
        handleAuthReturnNotice();
        initPresence(serviceClient);
        await loadRemoteFeed();
        subscribeRemoteFeed();
      } catch {
        presenceMode = "local";
        onlineCount = 1;
        renderStats();
      }
    }

    async function initAuth() {
      if (!serviceClient) return;
      const { data } = await serviceClient.auth.getSession();
      if (data.session?.user) {
        currentAccount = await accountFromUser(data.session.user);
        hydrateComposerAccount();
        setMode("member");
      }

      serviceClient.auth.onAuthStateChange(async (_event, session) => {
        if (session?.user) {
          currentAccount = await accountFromUser(session.user);
          hydrateComposerAccount();
          setMode("member");
          render();
          return;
        }
        if (currentAccount?.source === "remote") {
          currentAccount = null;
          setMode("guest");
          render();
        }
      });
    }

    function initPresence(supabase) {
      const channel = supabase.channel("again2002-online", {
        config: { presence: { key: getClientId() } }
      });

      channel.on("presence", { event: "sync" }, () => {
        const state = channel.presenceState();
        onlineCount = Object.values(state).reduce((sum, users) => sum + users.length, 0) || 1;
        presenceMode = "live";
        renderStats();
      });

      channel.subscribe(async (status) => {
        if (status === "SUBSCRIBED") {
          await channel.track({ online_at: new Date().toISOString() });
          presenceMode = "live";
          renderStats();
        }
      });

      window.addEventListener("beforeunload", () => {
        channel.untrack();
      });
    }

    async function loadRemoteFeed() {
      if (!serviceClient) return;
      const { data: remotePosts, error } = await serviceClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(80);

      if (error) throw error;

      const ids = (remotePosts || []).map((post) => post.id);
      let remoteComments = [];
      if (ids.length) {
        const commentsResult = await serviceClient
          .from("comments")
          .select("*")
          .in("post_id", ids)
          .order("created_at", { ascending: true });
        if (!commentsResult.error) remoteComments = commentsResult.data || [];
      }

      const commentsByPost = remoteComments.reduce((map, comment) => {
        map[comment.post_id] = map[comment.post_id] || [];
        map[comment.post_id].push(fromRemoteComment(comment));
        return map;
      }, {});

      posts = (remotePosts || []).map((post) => ({
        ...fromRemotePost(post),
        comments: commentsByPost[post.id] || []
      }));
      savePosts();
      render();
    }

    function subscribeRemoteFeed() {
      if (!serviceClient) return;
      serviceClient.channel("again2002-feed")
        .on("postgres_changes", { event: "*", schema: "public", table: "posts" }, scheduleRemoteRefresh)
        .on("postgres_changes", { event: "*", schema: "public", table: "comments" }, scheduleRemoteRefresh)
        .subscribe();
    }

    function scheduleRemoteRefresh() {
      clearTimeout(remoteRefreshTimer);
      remoteRefreshTimer = setTimeout(() => {
        loadRemoteFeed().catch(() => {});
      }, 350);
    }

    async function persistPost(post) {
      savePosts();
      if (!serviceClient) return;
      const result = await serviceClient.from("posts").upsert(toRemotePost(post));
      if (result.error && isMissingColumnError(result.error)) {
        const retry = await serviceClient.from("posts").upsert(toRemotePost(post, {
          category: !String(result.error.message || "").includes("category"),
          media: false
        }));
        if (retry.error && isMissingColumnError(retry.error)) {
          await serviceClient.from("posts").upsert(toRemotePost(post, { category: false, media: false }));
        }
        return;
      }
      if (result.error) throw result.error;
    }

    async function persistLike(post) {
      savePosts();
      if (!serviceClient) return;
      await serviceClient.from("posts").update({ likes: post.likes }).eq("id", post.id);
    }

    async function persistComment(postId, comment) {
      savePosts();
      if (!serviceClient) return;
      await serviceClient.from("comments").insert(toRemoteComment(postId, comment));
    }

    async function persistReport(report) {
      if (!serviceClient) return;
      await serviceClient.from("reports").insert({
        id: report.id,
        post_id: report.postId,
        reporter_id: report.reporterId,
        reason: report.reason,
        created_at: new Date(report.createdAt).toISOString()
      }).then(() => {});
    }

    function isMissingColumnError(error) {
      const message = String(error?.message || "");
      return message.includes("category") || message.includes("media_");
    }

    function toRemotePost(post, options = {}) {
      const includeCategory = options.category !== false;
      const includeMedia = options.media !== false;
      const payload = {
        id: post.id,
        author_id: post.authorId,
        author_base: post.authorBase,
        author_name: post.authorName,
        author_type: post.authorType || "guest",
        author_ip: post.authorIp || "",
        author_level: post.authorLevel || 0,
        author_verified: post.authorVerified === true,
        style: post.style,
        bg_color: post.bgColor,
        text_color: post.textColor,
        body_html: post.text,
        likes: post.likes,
        created_at: new Date(post.createdAt).toISOString()
      };
      if (includeCategory) payload.category = normalizeCategory(post.category);
      if (includeMedia) {
        const media = normalizeMedia(post.media);
        payload.media_type = media?.type || "";
        payload.media_url = media?.url || "";
        payload.media_name = media?.name || "";
        payload.media_size = media?.size || 0;
      }
      return payload;
    }

    function fromRemotePost(post) {
      return {
        id: post.id,
        authorId: post.author_id,
        authorBase: post.author_base,
        authorName: post.author_name,
        authorType: post.author_type || "guest",
        authorIp: post.author_ip || "",
        authorLevel: post.author_level || 0,
        authorVerified: post.author_verified === true,
        style: post.style,
        category: normalizeCategory(post.category),
        bgColor: post.bg_color,
        textColor: post.text_color,
        text: post.body_html,
        media: normalizeMedia({
          type: post.media_type,
          url: post.media_url,
          name: post.media_name,
          size: Number(post.media_size || 0)
        }),
        likes: post.likes || 0,
        comments: [],
        createdAt: new Date(post.created_at).getTime()
      };
    }

    function toRemoteComment(postId, comment) {
      return {
        id: comment.id,
        post_id: postId,
        author_id: comment.authorId,
        author_base: comment.authorBase,
        author_name: comment.authorName,
        author_type: comment.authorType || "guest",
        author_ip: comment.authorIp || "",
        author_level: comment.authorLevel || 0,
        author_verified: comment.authorVerified === true,
        body_html: comment.text,
        created_at: new Date(comment.createdAt).toISOString()
      };
    }

    function fromRemoteComment(comment) {
      return {
        id: comment.id,
        authorId: comment.author_id,
        authorBase: comment.author_base,
        authorName: comment.author_name,
        authorType: comment.author_type || "guest",
        authorIp: comment.author_ip || "",
        authorLevel: comment.author_level || 0,
        authorVerified: comment.author_verified === true,
        text: comment.body_html,
        createdAt: new Date(comment.created_at).getTime()
      };
    }

    function renderGoals() {
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);
      const todaysPosts = posts.filter((post) => post.createdAt >= todayStart.getTime());
      const todaysLikes = todaysPosts.reduce((sum, post) => sum + post.likes, 0);
      const todaysComments = posts.reduce((sum, post) => {
        return sum + post.comments.filter((comment) => comment.createdAt >= todayStart.getTime()).length;
      }, 0);
      const goalData = [
        { id: "likes10", label: "하트 10개 받기", value: todaysLikes, target: 10, xp: goalXp.likes10 },
        { id: "comments50", label: "댓글 50개 받기", value: todaysComments, target: 50, xp: goalXp.comments50 },
        { id: "posts3", label: "글 3개 올라오기", value: todaysPosts.length, target: 3, xp: goalXp.posts3 }
      ];
      awardGoalXp(goalData);
      const complete = goalData.filter((goal) => goal.value >= goal.target).length;
      document.querySelector("#goalSummary").textContent = `${complete}/3`;
      document.querySelector("#goals").innerHTML = goalData.map((goal) => {
        const percent = Math.min(100, Math.round((goal.value / goal.target) * 100));
        return `
          <li class="goal">
            <strong>${goal.label}</strong>
            <span>${goal.value}/${goal.target} · EXP +${goal.xp}</span>
            <div class="goal-meter"><span style="width:${percent}%"></span></div>
          </li>
        `;
      }).join("");
    }

    function awardGoalXp(goalData) {
      if (currentMode !== "member" || !currentAccount) return;
      const account = currentAccount.source === "remote" ? currentAccount : loadAccounts()[currentAccount.id];
      if (!account) return;

      const todayKey = new Date().toISOString().slice(0, 10);
      const awards = loadGoalAwards();
      awards[account.id] = awards[account.id] || {};
      awards[account.id][todayKey] = awards[account.id][todayKey] || {};

      let gained = 0;
      goalData.forEach((goal) => {
        if (goal.value >= goal.target && !awards[account.id][todayKey][goal.id]) {
          awards[account.id][todayKey][goal.id] = true;
          gained += goal.xp;
        }
      });

      if (!gained) return;
      account.xp += gained;
      while (account.xp >= xpForNext(account.level)) {
        account.xp -= xpForNext(account.level);
        account.level += 1;
      }
      saveAccount(account);
      currentAccount = account;
      localStorage.setItem(goalAwardKey, JSON.stringify(awards));
      syncMemberAuthor(account);
    }

    function renderAccount() {
      const accountBox = document.querySelector("#account");
      const nick = nicknameInput.value.trim();
      const base = normalizeNick(nick);
      document.querySelector("#accountMode").textContent = currentMode === "member" ? "로그인" : "비로그인";

      if (currentAccount) {
        const account = currentAccount.source === "remote" ? currentAccount : (loadAccounts()[currentAccount.id] || currentAccount);
        currentAccount = account;
        const needed = xpForNext(account.level);
        const percent = Math.min(100, Math.round((account.xp / needed) * 100));
        accountBox.innerHTML = `
          <div class="account-item">
            <strong><span class="${levelClass(account.level)}">${account.nick}</span> Lv.${account.level}</strong>
            <span>${account.source === "remote" ? account.email : "로컬 계정"} · EXP ${account.xp}/${needed} · ${levelTitle(account.level)}</span>
            <div class="xp-bar"><span style="width:${percent}%"></span></div>
          </div>
          <div class="account-form">
            <button class="logout-btn" id="logoutAccount" type="button">로그아웃</button>
            <div class="account-note">${account.source === "remote" ? "DB 계정입니다. 회원 글과 댓글에는 IP 대신 레벨이 표시됩니다." : "로컬 계정입니다. Supabase 연결 전 임시 계정으로만 유지됩니다."}</div>
          </div>
        `;
        document.querySelector("#logoutAccount").addEventListener("click", clearSessionAccount);
        return;
      }

      if (currentMode !== "member") {
        if (serviceClient) {
          accountBox.innerHTML = `
            <div class="account-item">
              <strong>회원가입</strong>
              <span>닉네임, 이메일, 비밀번호로 가입합니다. 로그인은 왼쪽 글쓰기의 로그인 탭에서 합니다.</span>
            </div>
            <div class="account-form">
              ${accountFormFields(nick)}
            </div>
          `;
          bindAccountForm();
          return;
        }
        accountBox.innerHTML = `
          <div class="account-item">
            <strong>${escapeHtml(base)} <span class="ip-tag">IP ${maskedIp()}</span></strong>
            <span>비로그인 글은 글쓰기 칸의 닉네임과 비밀번호로 작성됩니다. 카드에는 IP 번호가 붙고, 레벨 EXP는 쌓이지 않습니다.</span>
          </div>
          <div class="account-form">
            <div class="account-note">${serviceClient ? "회원가입만 여기서 합니다. 로그인은 왼쪽 글쓰기의 로그인 탭에서 해주세요." : "레벨을 올리고 싶으면 아래에서 같은 닉네임과 비밀번호로 계정을 만들면 됩니다."}</div>
            ${accountFormFields(nick)}
          </div>
        `;
        bindAccountForm();
        return;
      }

      accountBox.innerHTML = `
        <div class="account-item">
          <strong>회원가입</strong>
          <span>${serviceClient ? "가입 후 인증 메일을 확인하면 왼쪽 로그인 탭에서 글을 쓸 수 있습니다." : "회원으로 글을 쓰면 IP 대신 레벨이 붙고, 오늘의 목표 EXP가 누적됩니다."}</span>
        </div>
        <div class="account-form">
          ${accountFormFields(nick)}
          <div class="account-note">${serviceClient ? "닉네임은 카드에 표시되고, 로그인은 이메일과 비밀번호로 합니다." : "실명 인증 없는 로컬 계정입니다. 같은 브라우저에서만 로그인 상태가 유지됩니다."}</div>
        </div>
      `;
      bindAccountForm();
    }

    function accountFormFields(nick) {
      if (!serviceClient) {
        return `
          <input id="accountNick" maxlength="12" placeholder="닉네임" autocomplete="username" value="${escapeAttr(nick)}" />
          <input id="accountPassword" type="password" maxlength="24" placeholder="비밀번호 4자 이상" autocomplete="current-password" />
          <div class="account-actions">
            <button id="createAccount" type="button">가입</button>
            <button id="loginAccount" class="secondary" type="button">로그인</button>
          </div>
        `;
      }

      return `
        <div class="account-note">회원가입</div>
        <input id="signupDisplayName" maxlength="16" placeholder="닉네임" autocomplete="nickname" value="${escapeAttr(nick)}" />
        <input id="signupEmail" type="email" maxlength="80" placeholder="이메일" autocomplete="email" />
        <input id="signupPassword" type="password" maxlength="48" placeholder="비밀번호 6자 이상" autocomplete="new-password" />
        <div class="account-actions">
          <button id="createAccount" type="button">가입</button>
        </div>
      `;
    }

    function bindAccountForm() {
      const accountNick = document.querySelector("#accountNick");
      const signupDisplayName = document.querySelector("#signupDisplayName");
      const signupEmail = document.querySelector("#signupEmail");
      const signupPassword = document.querySelector("#signupPassword");
      const loginEmail = document.querySelector("#loginEmail");
      const loginPassword = document.querySelector("#loginPassword");
      const accountPassword = document.querySelector("#accountPassword");

      accountNick?.addEventListener("input", () => {
        nicknameInput.value = accountNick.value;
      });
      signupDisplayName?.addEventListener("input", () => {
        nicknameInput.value = signupDisplayName.value;
      });

      document.querySelector("#createAccount")?.addEventListener("click", async () => {
        const nickValue = serviceClient ? signupDisplayName?.value : accountNick?.value;
        const passwordValue = serviceClient ? signupPassword?.value : accountPassword?.value;
        const result = await createMemberAccount(nickValue || "", String(passwordValue || "").trim(), {
          email: signupEmail?.value
        });
        if (!result.ok) {
          showToast(result.message);
          return;
        }
        if (result.pendingEmail) {
          showToast(result.message);
          return;
        }
        saveSessionAccount(result.account);
      });

      document.querySelector("#loginAccount")?.addEventListener("click", async () => {
        const nickValue = serviceClient ? "" : accountNick?.value;
        const passwordValue = serviceClient ? loginPassword?.value : accountPassword?.value;
        const result = await loginMemberAccount(nickValue || "", String(passwordValue || "").trim(), {
          email: loginEmail?.value
        });
        if (!result.ok) {
          showToast(result.message);
          return;
        }
        saveSessionAccount(result.account);
      });
    }

    function renderProfile() {
      const profile = document.querySelector("#profile");
      const selected = activeAuthorId ? findAuthor(activeAuthorId) : null;
      document.querySelector("#feedTitle").textContent = selected ? `${selected.name}의 활동` : "전체 피드";
      clearFilter.classList.toggle("show", !!selected);
      document.querySelector("#profileCount").textContent = selected ? selected.name : "선택 없음";

      if (!selected) {
        profile.innerHTML = `
          <div class="profile-item">
            <strong>작성자를 눌러보세요</strong>
            <span>그 사람이 쓴 카드와 댓글이 피드에 모입니다.</span>
          </div>
        `;
        return;
      }

      const authoredPosts = posts.filter((post) => post.authorId === selected.id);
      const authoredComments = posts.flatMap((post) => post.comments
        .filter((comment) => comment.authorId === selected.id)
        .map((comment) => ({ ...comment, postText: stripTags(post.text).slice(0, 34) })));
      profile.innerHTML = `
        <div class="profile-item">
          <strong>${selected.verified ? `<span class="${levelClass(selected.level)}">${selected.name}</span> Lv.${selected.level}` : `${selected.name} <span class="ip-tag">IP ${selected.ip}</span>`}</strong>
          <span>작성 카드 ${authoredPosts.length}개 · 작성 댓글 ${authoredComments.length}개</span>
        </div>
        ${authoredPosts.slice(0, 3).map((post) => `<div class="profile-item"><strong>카드</strong><span>${stripTags(post.text).slice(0, 58)}</span></div>`).join("")}
        ${authoredComments.slice(0, 3).map((comment) => `<div class="profile-item"><strong>댓글</strong><span>${stripTags(comment.text).slice(0, 42)} · ${comment.postText}</span></div>`).join("")}
      `;
    }

    function findAuthor(authorId) {
      for (const post of posts) {
        if (post.authorId === authorId) return { id: post.authorId, name: post.authorName, verified: post.authorVerified, level: post.authorLevel || 0, ip: post.authorIp || maskedIp() };
        const comment = post.comments.find((item) => item.authorId === authorId);
        if (comment) return { id: comment.authorId, name: comment.authorName, verified: comment.authorVerified, level: comment.authorLevel || 0, ip: comment.authorIp || maskedIp() };
      }
      return null;
    }

    function levelClass(level) {
      const lv = Number(level || 1);
      if (lv >= 30) return "level-30";
      if (lv >= 20) return "level-20";
      if (lv >= 10) return "level-10";
      if (lv >= 5) return "level-5";
      return "";
    }

    function levelTitle(level) {
      const lv = Number(level || 1);
      if (lv >= 30) return "레전드";
      if (lv >= 20) return "고인물";
      if (lv >= 10) return "상주팬";
      if (lv >= 5) return "단골";
      return "신입";
    }

    function styleName(style) {
      return { paper: "기본", board: "칠판", bold: "강조" }[style] || "기본";
    }

    function normalizeCategory(category) {
      return categories[category] ? category : "sad";
    }

    function categoryName(category) {
      return categories[normalizeCategory(category)];
    }

    function applyStyleDefaults(style) {
      const colors = currentStyleDefaults()[style] || currentStyleDefaults().paper;
      bgColorInput.value = colors.bg;
      textColorInput.value = colors.fg;
    }

    function currentStyleDefaults() {
      return document.documentElement.dataset.theme === "dark" ? darkStyleDefaults : styleDefaults;
    }

    function relativeTime(timestamp) {
      const minutes = Math.max(0, Math.round((Date.now() - timestamp) / 60000));
      if (minutes < 1) return "방금";
      if (minutes < 60) return `${minutes}분 전`;
      return `${Math.round(minutes / 60)}시간 전`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(text) {
      return escapeHtml(text).replaceAll("`", "&#096;");
    }

    function stripTags(text) {
      const div = document.createElement("div");
      div.innerHTML = text;
      return div.textContent || "";
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function safeHex(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(String(value || "")) ? value : fallback;
    }

    function maskedIp() {
      const seed = simpleHash(getClientId());
      const a = 10 + (parseInt(seed.slice(0, 2), 16) % 220);
      const b = parseInt(seed.slice(2, 4), 16) % 256;
      return `${String(a).padStart(3, "0")}.${String(b).padStart(3, "0")}`;
    }

    function simpleHash(value) {
      let hash = 2166136261;
      String(value).split("").forEach((char) => {
        hash ^= char.charCodeAt(0);
        hash = Math.imul(hash, 16777619);
      });
      return (hash >>> 0).toString(16).padStart(8, "0");
    }

    function applyStoredTheme() {
      setTheme(localStorage.getItem(themeKey) || "light");
    }

    function setTheme(theme) {
      const normalized = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = normalized === "dark" ? "dark" : "";
      if (normalized === "light") document.documentElement.removeAttribute("data-theme");
      const nextLabel = normalized === "dark" ? "라이트모드로 전환" : "다크모드로 전환";
      themeToggle.setAttribute("aria-label", nextLabel);
      themeToggle.setAttribute("title", normalized === "dark" ? "라이트모드" : "다크모드");
      themeToggle.innerHTML = normalized === "dark"
        ? `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>`
        : `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.4A7.6 7.6 0 0 1 9.6 4 8.7 8.7 0 1 0 20 14.4Z"></path></svg>`;
      localStorage.setItem(themeKey, normalized);
      applyStyleDefaults(selectedStyle);
    }

    function remapLegacyColor(value) {
      const color = String(value || "").toLowerCase();
      return {
        "#fffaf0": "#f8f3e7",
        "#17191f": "#1d1c18",
        "#1d4638": "#36584a",
        "#f4f0d8": "#f4efdf",
        "#fff4f2": "#f4e8df",
        "#f6f7fb": "#eef1eb"
      }[color] || value;
    }

    function makeId() {
      if (globalThis.crypto && typeof globalThis.crypto.randomUUID === "function") return globalThis.crypto.randomUUID();
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function pulseNotice() {
      notice.animate([
        { transform: "translateX(0)" },
        { transform: "translateX(-5px)" },
        { transform: "translateX(5px)" },
        { transform: "translateX(0)" }
      ], { duration: 220, easing: "ease-out" });
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1700);
    }

    applyStyleDefaults("paper");
    render();
    initService();
  </script>
</body>
</html>
